name: Build Acid303 VST3

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ============================================================================
  # macOS — Universal Binary (arm64 + x86_64)
  # ============================================================================
  build-macos:
    name: macOS (Universal Binary)
    runs-on: macos-14          # Apple Silicon runner; can cross-compile x86_64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.4
        run: |
          git clone --depth=1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git JUCE

      - name: Install CMake (via Homebrew)
        run: brew install cmake

      - name: Configure (Universal Binary)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify Universal Binary
        run: |
          lipo -archs build/Acid303_artefacts/Release/VST3/Acid303.vst3/Contents/MacOS/Acid303
          echo "Build complete."

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acid303-macOS-universal
          path: build/Acid303_artefacts/Release/VST3/Acid303.vst3
          retention-days: 30

  # ============================================================================
  # Windows — VST3 (MSVC, static runtime)
  # ============================================================================
  build-windows:
    name: Windows (MSVC x64)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone JUCE 8.0.4
        run: |
          git clone --depth=1 --branch 8.0.4 `
            https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure (MSVC, x64)
        run: |
          cmake -S . -B build `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acid303-Windows-x64
          path: build/Acid303_artefacts/Release/VST3/Acid303.vst3
          retention-days: 30

  # ============================================================================
  # Linux — VST3 (GCC, Ubuntu 22.04)
  # ============================================================================
  build-linux:
    name: Linux (GCC, Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libasound2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev

      - name: Clone JUCE 8.0.4
        run: |
          git clone --depth=1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acid303-Linux-x64
          path: build/Acid303_artefacts/Release/VST3/Acid303.vst3
          retention-days: 30
